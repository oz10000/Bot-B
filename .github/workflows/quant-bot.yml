name: Quant Bot Simulation

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  run-bot:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r quant-bot-actions/requirements.txt

      - name: Run bot
        working-directory: quant-bot-actions
        run: |
          python -m quant_bot.main

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: quant-bot-reports
          path: quant-bot-actions/runtime/
